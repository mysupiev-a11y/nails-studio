<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Записи | Nails Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fffafb; font-family: sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .badge-s { background: #fff0f3; color: #ff8fab; border: 1px solid #ffb6c1; border-radius: 8px; padding: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 style="color: #ff8fab;">Список записей</h2>
            <a href="/logout" class="text-muted text-decoration-none">Выйти →</a>
        </div>
        <div class="card p-4">
            <table class="table" id="bookingTable">
                <thead><tr><th>Клиент</th><th>Услуга</th><th>Время</th><th></th></tr></thead>
                <tbody>
                    {% for b in bookings %}
                    <tr>
                        <td><b>{{ b[1] }}</b></td>
                        <td><span class="badge-s">{{ b[2] }}</span></td>
                        <td class="text-muted">{{ b[3] }}</td>
                        <td><a href="/delete/{{ b[0] }}" class="btn btn-sm btn-outline-danger">Удалить</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <script>
        // Код уведомлений исправлен, чтобы VS Code не ругался красным
        let count = parseInt("{{ bookings|length }}");
        if (Notification.permission !== "granted") Notification.requestPermission();
        
        setInterval(() => {
            fetch('/admin').then(r => r.text()).then(html => {
                let doc = new DOMParser().parseFromString(html, 'text/html');
                if (doc.querySelectorAll('tbody tr').length > count) {
                    if (Notification.permission === "granted") {
                        new Notification("Nails Studio", { body: "Новая запись на процедуру!" });
                    }
                    location.reload();
                }
            });
        }, 15000);
    </script>
</body>
</html>
